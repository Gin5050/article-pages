<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Code as Agent Harness graphic recording</title>
  <desc id="desc">Code as Agent Harness の日本語グラレコ。論文の taxonomy、harness interface、mechanisms、multi-agent scaling、applications、open problems を抽象化して整理する。</desc>
  <defs>
    <style>
      .paper{fill:#fffdf8}.ink{fill:#202a36}.muted{fill:#596779}.line{stroke:#202a36;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.thin{stroke:#202a36;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}.dash{stroke:#8290a1;stroke-width:3;stroke-dasharray:9 10;fill:none}.card{fill:#fff;stroke:#202a36;stroke-width:4;rx:20}.shadow{filter:url(#shadow)}.blue{fill:#d8ecff}.green{fill:#d9f5df}.yellow{fill:#ffeab1}.pink{fill:#ffd9e8}.purple{fill:#e5ddff}.orange{fill:#ffd7ad}.mint{fill:#cff4ee}.gray{fill:#eef2f7}.red{fill:#ffd1cc}.big{font:800 52px sans-serif}.sub{font:28px sans-serif}.h{font:800 34px sans-serif}.m{font:700 28px sans-serif}.s{font:24px sans-serif}.xs{font:21px sans-serif}.tiny{font:18px sans-serif}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#233044" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1 L11 6 L1 11 Z" fill="#202a36"/>
    </marker>
  </defs>

  <rect width="1800" height="1120" class="paper"/>
  <path class="dash" d="M76 132 C300 78 508 114 746 82 C1030 45 1290 84 1720 118"/>
  <text x="74" y="74" class="big ink">Code as Agent Harness</text>
  <text x="78" y="118" class="sub muted">コードは「出力」だけでなく、推論・行動・状態・検証・協調を動かす実行基盤になる</text>

  <rect x="70" y="170" width="310" height="205" class="card yellow shadow"/>
  <text x="104" y="220" class="h ink">背景</text>
  <text x="104" y="266" class="s ink">LLM はコードを</text>
  <text x="104" y="302" class="s ink">書くだけでなく</text>
  <text x="104" y="338" class="s ink">実行して観測する</text>
  <path class="thin" d="M285 214 l38 0 l0 58 l-38 0"/>
  <path class="thin" d="M298 236 h12 M298 252 h12 M298 268 h12"/>

  <rect x="70" y="430" width="310" height="250" class="card red shadow"/>
  <text x="104" y="480" class="h ink">従来の見方</text>
  <text x="104" y="528" class="s ink">Prompt → Code</text>
  <text x="104" y="565" class="s ink">正しい出力か？</text>
  <text x="104" y="615" class="xs muted">でも agent では</text>
  <text x="104" y="646" class="xs muted">実行中の状態と検証が増える</text>
  <path class="line" marker-end="url(#arrow)" d="M122 575 H305"/>

  <rect x="70" y="735" width="310" height="250" class="card green shadow"/>
  <text x="104" y="785" class="h ink">新しい見方</text>
  <text x="104" y="832" class="s ink">Code = Harness</text>
  <text x="104" y="870" class="xs muted">executable</text>
  <text x="104" y="902" class="xs muted">inspectable</text>
  <text x="104" y="934" class="xs muted">stateful</text>
  <circle cx="300" cy="885" r="44" class="blue" stroke="#202a36" stroke-width="4"/>
  <path class="thin" d="M277 882 h46 M300 859 v46"/>

  <rect x="465" y="166" width="810" height="820" class="card blue shadow"/>
  <text x="505" y="218" class="h ink">論文の Taxonomy: 3つの層</text>

  <rect x="515" y="265" width="710" height="190" class="card mint"/>
  <text x="548" y="312" class="m ink">1. Harness Interface</text>
  <text x="548" y="354" class="s ink">コードがモデルと環境をつなぐ入口</text>
  <rect x="548" y="382" width="190" height="46" class="card yellow"/>
  <text x="572" y="413" class="xs ink">推論を実行</text>
  <rect x="765" y="382" width="190" height="46" class="card green"/>
  <text x="789" y="413" class="xs ink">行動をプログラム化</text>
  <rect x="982" y="382" width="190" height="46" class="card purple"/>
  <text x="1006" y="413" class="xs ink">環境を表現</text>

  <path class="line" marker-end="url(#arrow)" d="M870 455 V500"/>
  <rect x="515" y="500" width="710" height="250" class="card yellow"/>
  <text x="548" y="548" class="m ink">2. Harness Mechanisms</text>
  <text x="548" y="590" class="s ink">長時間実行を bounded / observable / revisable にする</text>
  <g>
    <rect x="548" y="622" width="118" height="54" class="card blue"/><text x="570" y="657" class="xs ink">計画</text>
    <rect x="682" y="622" width="118" height="54" class="card green"/><text x="704" y="657" class="xs ink">記憶</text>
    <rect x="816" y="622" width="118" height="54" class="card pink"/><text x="838" y="657" class="xs ink">ツール</text>
    <rect x="950" y="622" width="118" height="54" class="card purple"/><text x="972" y="657" class="xs ink">制御</text>
    <rect x="1084" y="622" width="118" height="54" class="card orange"/><text x="1101" y="657" class="xs ink">最適化</text>
  </g>
  <path class="thin" marker-end="url(#arrow)" d="M660 715 C740 760 995 760 1080 715"/>
  <text x="730" y="725" class="xs muted">Plan → Execute → Verify → Revise / Rollback</text>

  <path class="line" marker-end="url(#arrow)" d="M870 750 V795"/>
  <rect x="515" y="795" width="710" height="150" class="card purple"/>
  <text x="548" y="842" class="m ink">3. Scaling the Harness</text>
  <text x="548" y="884" class="s ink">共有コード基盤で複数エージェントが協調</text>
  <text x="548" y="918" class="xs muted">manager / planner / coder / reviewer / tester</text>

  <rect x="1365" y="170" width="360" height="245" class="card green shadow"/>
  <text x="1400" y="220" class="h ink">Agent が作るコード</text>
  <text x="1400" y="268" class="xs ink">regression tests</text>
  <text x="1400" y="302" class="xs ink">temporary tools</text>
  <text x="1400" y="336" class="xs ink">DSL / workflows</text>
  <text x="1400" y="370" class="xs ink">reusable skills</text>
  <path class="thin" d="M1655 230 l30 28 l-30 28 M1622 258 h62"/>

  <rect x="1365" y="465" width="360" height="250" class="card orange shadow"/>
  <text x="1400" y="515" class="h ink">応用領域</text>
  <text x="1400" y="563" class="xs ink">Coding assistants</text>
  <text x="1400" y="596" class="xs ink">GUI / OS agents</text>
  <text x="1400" y="629" class="xs ink">Scientific discovery</text>
  <text x="1400" y="662" class="xs ink">Embodied agents</text>
  <text x="1400" y="695" class="xs ink">Enterprise workflows</text>

  <rect x="1365" y="765" width="360" height="220" class="card pink shadow"/>
  <text x="1400" y="815" class="h ink">未解決問題</text>
  <text x="1400" y="861" class="xs ink">成功率を超える評価</text>
  <text x="1400" y="895" class="xs ink">不完全 feedback の検証</text>
  <text x="1400" y="929" class="xs ink">共有状態の一貫性</text>
  <text x="1400" y="963" class="xs ink">人間の oversight</text>

  <path class="line" marker-end="url(#arrow)" d="M380 835 C425 835 430 650 465 650"/>
  <path class="line" marker-end="url(#arrow)" d="M1275 320 C1318 310 1325 290 1365 280"/>
  <path class="line" marker-end="url(#arrow)" d="M1275 640 C1320 640 1324 588 1365 588"/>
  <path class="line" marker-end="url(#arrow)" d="M1275 865 C1320 865 1324 875 1365 875"/>

  <rect x="455" y="1028" width="890" height="58" class="card gray"/>
  <text x="492" y="1065" class="s ink">読後に残す一言: 「コードを書くAI」ではなく「コードで環境と自己を制御するAI」へ</text>
</svg>
