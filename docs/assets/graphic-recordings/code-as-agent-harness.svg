<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Code as Agent Harness graphic recording</title>
  <desc id="desc">コードを reasoning, action, state, verification, coordination の実行基盤として捉える日本語グラレコ。</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.ink{fill:#243042}.muted{fill:#5d6a7b}.line{stroke:#243042;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}.soft{stroke:#9aa8b8;stroke-width:3;stroke-dasharray:8 10;fill:none}.card{fill:#ffffff;stroke:#243042;stroke-width:4;rx:22}.yellow{fill:#ffe6a6}.blue{fill:#cfe8ff}.green{fill:#cef3dc}.pink{fill:#ffd6e6}.purple{fill:#ddd6ff}.orange{fill:#ffd2a6}.small{font: 26px sans-serif}.mid{font: 34px sans-serif;font-weight:700}.big{font: 46px sans-serif;font-weight:800}.tiny{font: 22px sans-serif}.label{font: 28px sans-serif;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <path class="soft" d="M90 120 C280 70 410 96 560 74 C760 45 970 72 1285 112"/>
  <text x="70" y="72" class="big ink">Code as Agent Harness</text>
  <text x="75" y="116" class="small muted">コードを「生成物」ではなく、エージェントを動かす実行・検証・状態の基盤として読む</text>

  <rect x="70" y="170" width="285" height="185" class="card yellow"/>
  <text x="100" y="220" class="label ink">背景</text>
  <text x="100" y="265" class="small ink">LLM はコードを</text>
  <text x="100" y="302" class="small ink">書くだけではない</text>
  <text x="100" y="339" class="tiny muted">実行・観測・修正する</text>

  <rect x="70" y="420" width="285" height="230" class="card pink"/>
  <text x="100" y="470" class="label ink">課題</text>
  <text x="100" y="515" class="small ink">長時間タスクは</text>
  <text x="100" y="552" class="small ink">状態が増える</text>
  <text x="100" y="589" class="tiny muted">計画 / 記憶 / 権限</text>
  <text x="100" y="622" class="tiny muted">検証 / ロールバック</text>

  <rect x="460" y="160" width="475" height="500" class="card blue"/>
  <text x="500" y="210" class="label ink">3層の整理</text>
  <circle cx="555" cy="300" r="55" class="green" stroke="#243042" stroke-width="4"/>
  <text x="520" y="292" class="tiny ink">Harness</text>
  <text x="520" y="322" class="tiny ink">Interface</text>
  <text x="635" y="300" class="small ink">推論・行動・環境表現</text>
  <path class="line" d="M555 358 L555 420"/>
  <circle cx="555" cy="480" r="55" class="purple" stroke="#243042" stroke-width="4"/>
  <text x="520" y="472" class="tiny ink">Harness</text>
  <text x="505" y="502" class="tiny ink">Mechanisms</text>
  <text x="635" y="480" class="small ink">計画・記憶・ツール・制御</text>
  <path class="line" d="M555 538 L555 600"/>
  <circle cx="555" cy="660" r="55" class="orange" stroke="#243042" stroke-width="4"/>
  <text x="520" y="652" class="tiny ink">Scaling</text>
  <text x="505" y="682" class="tiny ink">Harness</text>
  <text x="635" y="660" class="small ink">複数エージェント協調</text>

  <rect x="1020" y="170" width="310" height="210" class="card green"/>
  <text x="1050" y="220" class="label ink">コードの役割</text>
  <text x="1050" y="268" class="small ink">実行できる</text>
  <text x="1050" y="305" class="small ink">検査できる</text>
  <text x="1050" y="342" class="small ink">状態を持てる</text>

  <rect x="1020" y="445" width="310" height="225" class="card yellow"/>
  <text x="1050" y="495" class="label ink">残る難所</text>
  <text x="1050" y="543" class="tiny ink">成功率だけでは足りない</text>
  <text x="1050" y="578" class="tiny ink">不完全 feedback の検証</text>
  <text x="1050" y="613" class="tiny ink">共有状態の一貫性</text>
  <text x="1050" y="648" class="tiny ink">人間の oversight</text>

  <path class="line" d="M358 260 C410 250 420 235 460 235"/>
  <path class="line" d="M358 535 C405 560 420 600 460 620"/>
  <path class="line" d="M935 410 C975 390 985 325 1020 292"/>
  <path class="line" d="M935 520 C985 535 990 565 1020 575"/>

  <rect x="455" y="715" width="520" height="60" class="card"/>
  <text x="485" y="754" class="small ink">読むポイント: 「コードを書くAI」から「コードで動くAI」へ</text>
</svg>
