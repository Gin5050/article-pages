<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From Skill Text to Skill Structure の日本語グラレコ</title>
  <desc id="desc">Agent skill の自然言語記述を、Scheduling、Structural、Logical の三層表現へ分ける論文の概要図。</desc>
  <rect width="1600" height="900" fill="#fffaf0"/>
  <g fill="none" stroke="#263238" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.16">
    <path d="M68 105 C220 82 350 93 506 75"/>
    <path d="M980 105 C1130 82 1280 96 1485 70"/>
    <path d="M88 792 C390 850 760 810 1110 842 C1265 856 1384 837 1515 812"/>
  </g>
  <text x="800" y="70" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700" fill="#1f2a2e">From Skill Text to Skill Structure</text>
  <text x="800" y="116" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#40545d">Scheduling-Structural-Logical Representation for Agent Skills</text>

  <g transform="translate(70 165)">
    <rect x="0" y="0" width="385" height="610" rx="28" fill="#ffffff" stroke="#263238" stroke-width="4"/>
    <rect x="26" y="28" width="190" height="52" rx="16" fill="#ffdf99" stroke="#263238" stroke-width="3"/>
    <text x="121" y="63" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#263238">背景</text>
    <text x="32" y="126" font-family="sans-serif" font-size="27" font-weight="700" fill="#263238">Skill は増える</text>
    <text x="32" y="172" font-family="sans-serif" font-size="22" fill="#263238">SKILL.md、手順書、</text>
    <text x="32" y="207" font-family="sans-serif" font-size="22" fill="#263238">ツール呼び出し、制約が</text>
    <text x="32" y="242" font-family="sans-serif" font-size="22" fill="#263238">自然言語に混ざる</text>
    <g transform="translate(52 298)">
      <rect x="0" y="0" width="280" height="86" rx="20" fill="#eaf4ff" stroke="#263238" stroke-width="3"/>
      <text x="140" y="36" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#263238">ひとつの本文</text>
      <text x="140" y="68" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#263238">呼び出し + 手順 + 副作用</text>
    </g>
    <path d="M192 405 L192 488" stroke="#263238" stroke-width="5"/>
    <path d="M170 468 L192 492 L214 468" fill="none" stroke="#263238" stroke-width="5"/>
    <rect x="38" y="505" width="306" height="74" rx="18" fill="#ffd7d7" stroke="#263238" stroke-width="3"/>
    <text x="191" y="550" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#263238">検索と監査が難しい</text>
  </g>

  <g transform="translate(520 180)">
    <rect x="0" y="0" width="560" height="580" rx="34" fill="#ffffff" stroke="#263238" stroke-width="4"/>
    <text x="280" y="54" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#263238">提案: SSL 表現</text>
    <g transform="translate(56 105)">
      <rect x="0" y="0" width="448" height="92" rx="24" fill="#d9f0ff" stroke="#263238" stroke-width="4"/>
      <text x="30" y="38" font-family="sans-serif" font-size="25" font-weight="700" fill="#263238">1. Scheduling</text>
      <text x="30" y="72" font-family="sans-serif" font-size="21" fill="#263238">いつ呼ぶか / どんな signal か</text>
    </g>
    <g transform="translate(56 236)">
      <rect x="0" y="0" width="448" height="92" rx="24" fill="#e7f7d7" stroke="#263238" stroke-width="4"/>
      <text x="30" y="38" font-family="sans-serif" font-size="25" font-weight="700" fill="#263238">2. Structural</text>
      <text x="30" y="72" font-family="sans-serif" font-size="21" fill="#263238">場面 / 手順 / 分岐の構造</text>
    </g>
    <g transform="translate(56 367)">
      <rect x="0" y="0" width="448" height="92" rx="24" fill="#f6e3ff" stroke="#263238" stroke-width="4"/>
      <text x="30" y="38" font-family="sans-serif" font-size="25" font-weight="700" fill="#263238">3. Logical</text>
      <text x="30" y="72" font-family="sans-serif" font-size="21" fill="#263238">atomic action / resource use</text>
    </g>
    <path d="M280 197 L280 230" stroke="#263238" stroke-width="4"/>
    <path d="M280 328 L280 361" stroke="#263238" stroke-width="4"/>
    <rect x="120" y="500" width="320" height="52" rx="18" fill="#fff0b8" stroke="#263238" stroke-width="3"/>
    <text x="280" y="535" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#263238">LLM normalizer で変換</text>
  </g>

  <g transform="translate(1145 165)">
    <rect x="0" y="0" width="385" height="610" rx="28" fill="#ffffff" stroke="#263238" stroke-width="4"/>
    <rect x="26" y="28" width="190" height="52" rx="16" fill="#bdebd4" stroke="#263238" stroke-width="3"/>
    <text x="121" y="63" text-anchor="middle" font-family="sans-serif" font-size="25" font-weight="700" fill="#263238">結果</text>
    <text x="32" y="126" font-family="sans-serif" font-size="27" font-weight="700" fill="#263238">構造が効く</text>
    <g transform="translate(38 168)">
      <rect x="0" y="0" width="310" height="105" rx="20" fill="#eaf4ff" stroke="#263238" stroke-width="3"/>
      <text x="155" y="42" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#263238">Skill Discovery</text>
      <text x="155" y="78" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#263238">MRR 0.573 → 0.707</text>
    </g>
    <g transform="translate(38 306)">
      <rect x="0" y="0" width="310" height="105" rx="20" fill="#f6e3ff" stroke="#263238" stroke-width="3"/>
      <text x="155" y="42" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#263238">Risk Assessment</text>
      <text x="155" y="78" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#263238">F1 0.744 → 0.787</text>
    </g>
    <rect x="38" y="462" width="310" height="88" rx="20" fill="#fff0b8" stroke="#263238" stroke-width="3"/>
    <text x="193" y="499" text-anchor="middle" font-family="sans-serif" font-size="23" font-weight="700" fill="#263238">結論</text>
    <text x="193" y="532" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#263238">検索しやすく監査しやすい</text>
  </g>

  <path d="M456 465 C490 455 496 455 520 455" fill="none" stroke="#263238" stroke-width="5"/>
  <path d="M496 435 L522 455 L496 477" fill="none" stroke="#263238" stroke-width="5"/>
  <path d="M1080 455 C1110 455 1117 455 1145 465" fill="none" stroke="#263238" stroke-width="5"/>
  <path d="M1122 438 L1148 466 L1114 477" fill="none" stroke="#263238" stroke-width="5"/>

  <g transform="translate(300 800)">
    <rect x="0" y="0" width="1000" height="58" rx="22" fill="#ffffff" stroke="#263238" stroke-width="3"/>
    <text x="500" y="37" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#263238">自然言語 skill を捨てずに、呼び出し・構造・副作用を機械が読める形へ分ける</text>
  </g>
</svg>
