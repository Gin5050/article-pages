<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">From Skill Text to Skill Structure の日本語グラレコ</title>
  <desc id="desc">Agent skill の自然言語記述を、Scheduling、Structural、Logical の三層表現へ分け、検索とリスク監査を改善する論文のグラフィックレコーディング。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#263238" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L13 7 L1 13 Z" fill="#263238"/>
    </marker>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;fill:#263238}
      .h{font-weight:800}
      .m{font-weight:700}
      .s{font-size:22px}
      .xs{font-size:18px}
      .line{fill:none;stroke:#263238;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#263238;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
      .card{fill:#fffdf8;stroke:#263238;stroke-width:4;rx:24;filter:url(#shadow)}
      .note{stroke:#263238;stroke-width:3;rx:18}
    </style>
  </defs>

  <rect width="1800" height="1100" fill="#fff7e8"/>
  <g opacity="0.22" class="thin">
    <path d="M80 135 C270 90 510 120 710 83"/>
    <path d="M1130 92 C1360 132 1510 88 1710 128"/>
    <path d="M110 1010 C410 1068 735 1005 1050 1042 C1270 1068 1490 1045 1705 1018"/>
    <path d="M105 250 C160 230 205 250 250 220"/>
    <path d="M1540 245 C1600 220 1660 255 1715 225"/>
  </g>

  <text x="900" y="68" text-anchor="middle" class="t h" font-size="44">From Skill Text to Skill Structure</text>
  <text x="900" y="112" text-anchor="middle" class="t m" font-size="25">Scheduling-Structural-Logical Representation for Agent Skills</text>
  <rect x="570" y="132" width="660" height="42" rx="18" fill="#fff0b8" stroke="#263238" stroke-width="3"/>
  <text x="900" y="160" text-anchor="middle" class="t m" font-size="21">自然言語 skill を「探せる・監査できる・運用できる」構造へ</text>

  <g transform="translate(62 215)">
    <rect width="390" height="315" class="card"/>
    <rect x="24" y="24" width="132" height="46" class="note" fill="#ffdf99"/>
    <text x="90" y="55" text-anchor="middle" class="t h" font-size="24">背景</text>
    <text x="30" y="108" class="t h" font-size="27">Agent skill が増える</text>
    <text x="30" y="152" class="t s">手順・制約・tool call が</text>
    <text x="30" y="184" class="t s">SKILL.md 風の本文に集まる</text>
    <g transform="translate(40 218)">
      <rect width="310" height="62" rx="18" fill="#eaf4ff" stroke="#263238" stroke-width="3"/>
      <text x="155" y="39" text-anchor="middle" class="t m" font-size="21">人間にもLLMにも読める</text>
    </g>
  </g>

  <g transform="translate(62 570)">
    <rect width="390" height="320" class="card"/>
    <rect x="24" y="24" width="132" height="46" class="note" fill="#ffd7d7"/>
    <text x="90" y="55" text-anchor="middle" class="t h" font-size="24">課題</text>
    <text x="30" y="110" class="t h" font-size="26">でも、混ざる</text>
    <g class="t s">
      <text x="34" y="158">・いつ呼ぶ？</text>
      <text x="34" y="194">・どんな手順？</text>
      <text x="34" y="230">・何に触る？</text>
      <text x="34" y="266">・危険な副作用は？</text>
    </g>
    <path d="M260 116 C320 122 350 170 324 214 C302 252 263 251 238 228" class="thin"/>
    <path d="M242 229 L222 225 L234 244" class="thin"/>
  </g>

  <g transform="translate(515 215)">
    <rect width="770" height="675" class="card"/>
    <text x="385" y="54" text-anchor="middle" class="t h" font-size="32">提案: SSL の三層表現</text>

    <g transform="translate(54 93)">
      <rect width="660" height="126" rx="26" fill="#d9f0ff" stroke="#263238" stroke-width="4"/>
      <circle cx="56" cy="63" r="34" fill="#ffffff" stroke="#263238" stroke-width="3"/>
      <text x="56" y="73" text-anchor="middle" class="t h" font-size="28">1</text>
      <text x="110" y="49" class="t h" font-size="27">Scheduling layer</text>
      <text x="110" y="86" class="t s">skill-level の呼び出し信号</text>
      <text x="442" y="49" class="t xs">task signal</text>
      <text x="442" y="78" class="t xs">ユーザー意図</text>
      <text x="442" y="107" class="t xs">前提条件</text>
    </g>

    <g transform="translate(54 260)">
      <rect width="660" height="126" rx="26" fill="#e5f7d3" stroke="#263238" stroke-width="4"/>
      <circle cx="56" cy="63" r="34" fill="#ffffff" stroke="#263238" stroke-width="3"/>
      <text x="56" y="73" text-anchor="middle" class="t h" font-size="28">2</text>
      <text x="110" y="49" class="t h" font-size="27">Structural layer</text>
      <text x="110" y="86" class="t s">scene-level の実行構造</text>
      <text x="442" y="49" class="t xs">場面</text>
      <text x="442" y="78" class="t xs">手順・分岐</text>
      <text x="442" y="107" class="t xs">subgoal</text>
    </g>

    <g transform="translate(54 427)">
      <rect width="660" height="126" rx="26" fill="#f4e2ff" stroke="#263238" stroke-width="4"/>
      <circle cx="56" cy="63" r="34" fill="#ffffff" stroke="#263238" stroke-width="3"/>
      <text x="56" y="73" text-anchor="middle" class="t h" font-size="28">3</text>
      <text x="110" y="49" class="t h" font-size="27">Logical layer</text>
      <text x="110" y="86" class="t s">action と resource-use の証拠</text>
      <text x="442" y="49" class="t xs">atomic action</text>
      <text x="442" y="78" class="t xs">tool call</text>
      <text x="442" y="107" class="t xs">side effects</text>
    </g>

    <path d="M384 219 L384 257" class="line" marker-end="url(#arrow)"/>
    <path d="M384 386 L384 424" class="line" marker-end="url(#arrow)"/>
    <g transform="translate(126 595)">
      <rect width="518" height="52" rx="18" fill="#fff0b8" stroke="#263238" stroke-width="3"/>
      <text x="259" y="34" text-anchor="middle" class="t m" font-size="21">LLM normalizer が skill text から三層 JSON へ変換</text>
    </g>
  </g>

  <g transform="translate(1348 215)">
    <rect width="390" height="315" class="card"/>
    <rect x="24" y="24" width="132" height="46" class="note" fill="#bdebd4"/>
    <text x="90" y="55" text-anchor="middle" class="t h" font-size="24">検証</text>
    <text x="30" y="110" class="t h" font-size="25">2つのタスクで比較</text>
    <g transform="translate(34 145)">
      <rect width="322" height="62" rx="18" fill="#eaf4ff" stroke="#263238" stroke-width="3"/>
      <text x="161" y="39" text-anchor="middle" class="t m" font-size="21">Skill Discovery</text>
    </g>
    <g transform="translate(34 226)">
      <rect width="322" height="62" rx="18" fill="#f4e2ff" stroke="#263238" stroke-width="3"/>
      <text x="161" y="39" text-anchor="middle" class="t m" font-size="21">Risk Assessment</text>
    </g>
  </g>

  <g transform="translate(1348 570)">
    <rect width="390" height="320" class="card"/>
    <rect x="24" y="24" width="132" height="46" class="note" fill="#bdebd4"/>
    <text x="90" y="55" text-anchor="middle" class="t h" font-size="24">結果</text>
    <g transform="translate(34 99)">
      <rect width="322" height="72" rx="18" fill="#eaf4ff" stroke="#263238" stroke-width="3"/>
      <text x="161" y="28" text-anchor="middle" class="t m" font-size="20">Skill Discovery</text>
      <text x="161" y="58" text-anchor="middle" class="t h" font-size="27">MRR 0.573 → 0.707</text>
    </g>
    <g transform="translate(34 196)">
      <rect width="322" height="72" rx="18" fill="#f4e2ff" stroke="#263238" stroke-width="3"/>
      <text x="161" y="28" text-anchor="middle" class="t m" font-size="20">Risk Assessment</text>
      <text x="161" y="58" text-anchor="middle" class="t h" font-size="27">F1 0.744 → 0.787</text>
    </g>
    <text x="195" y="302" text-anchor="middle" class="t xs">構造化すると、探しやすく監査しやすい</text>
  </g>

  <path d="M452 365 C482 360 490 350 515 350" class="line" marker-end="url(#arrow)"/>
  <path d="M452 734 C486 727 493 724 515 715" class="line" marker-end="url(#arrow)"/>
  <path d="M1285 350 C1310 350 1320 360 1348 365" class="line" marker-end="url(#arrow)"/>
  <path d="M1285 715 C1312 724 1321 728 1348 734" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(158 930)">
    <rect width="1484" height="92" rx="28" fill="#fffdf8" stroke="#263238" stroke-width="4" filter="url(#shadow)"/>
    <rect x="24" y="22" width="150" height="48" rx="18" fill="#ffd7d7" stroke="#263238" stroke-width="3"/>
    <text x="99" y="54" text-anchor="middle" class="t h" font-size="22">限界</text>
    <text x="205" y="39" class="t s">完成した skill 標準ではない。LLM normalizer の抽出品質に依存する。</text>
    <text x="205" y="72" class="t s">ただし、自然言語 skill に machine-readable な index と risk surface を重ねる実用的な一歩になる。</text>
  </g>
</svg>
